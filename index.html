<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <title>Create Account | Professional Registration</title>
    <meta
      name="description"
      content="Create your professional account to access exclusive wholesale pricing and pro perks."
    />
    <meta name="author" content="Lovable" />

    <!-- Preload critical fonts for faster rendering -->
    <link rel="preload" href="/fonts/die-grotesk-b-regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/die-grotesk-b-medium.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/termina-medium.otf" as="font" type="font/opentype" crossorigin />

    <!-- Bebas Neue fallback for Termina -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/index.css" />

    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: hsl(36 33% 96%);
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #root {
        min-height: 100vh;
      }
    </style>

    <meta property="og:title" content="Create Account | Professional Registration" />
    <meta
      property="og:description"
      content="Create your professional account to access exclusive wholesale pricing and pro perks."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root">
      <div class="boot-shell" aria-hidden="true">
        <div class="boot-app">
          <div class="boot-panel">
            <div class="boot-top">
              <div class="boot-brand">DROP DEAD</div>
              <div class="boot-block boot-block--light" style="width: 56px; height: 56px; opacity: 0.8"></div>
            </div>

            <div class="boot-hero">
              <div class="boot-block boot-block--light" style="width: 156px; height: 28px; opacity: 0.8"></div>
              <div class="boot-block boot-block--light" style="width: 62%; height: 52px; border-radius: 14px; opacity: 0.85"></div>
              <div class="boot-block boot-block--light" style="width: 76%; height: 52px; border-radius: 14px"></div>
              <div class="boot-block boot-block--light" style="width: 48%; height: 18px; border-radius: 8px; opacity: 0.7"></div>
            </div>

            <div class="boot-bottom">
              <div class="boot-row">
                <div class="boot-block boot-block--light" style="width: 40px; height: 5px"></div>
                <div class="boot-block boot-block--light" style="width: 5px; height: 5px; opacity: 0.55"></div>
                <div class="boot-block boot-block--light" style="width: 5px; height: 5px; opacity: 0.35"></div>
              </div>
              <div class="boot-block boot-block--light" style="width: 108px; height: 34px; opacity: 0.7"></div>
            </div>
          </div>

          <div class="boot-right">
            <div class="boot-header">
              <div class="boot-block boot-block--dark" style="width: 124px; height: 38px"></div>
              <div class="boot-block boot-block--dark" style="width: 142px; height: 16px; border-radius: 8px; opacity: 0.65"></div>
            </div>

            <div class="boot-content">
              <div class="boot-form">
                <div class="boot-block boot-block--dark" style="width: 118px; height: 12px; border-radius: 8px; opacity: 0.7"></div>
                <div class="boot-block boot-block--dark" style="width: 66%; height: 40px; border-radius: 12px"></div>
                <div class="boot-block boot-block--dark" style="width: 88%; height: 18px; border-radius: 8px; opacity: 0.75"></div>
                <div class="boot-block boot-block--dark" style="width: 100%; height: 56px; border-radius: 16px; opacity: 0.9"></div>
                <div class="boot-block boot-block--dark" style="width: 100%; height: 56px; border-radius: 16px; opacity: 0.9"></div>
                <div class="boot-grid">
                  <div class="boot-block boot-block--dark" style="width: 100%; height: 56px; border-radius: 16px; opacity: 0.9"></div>
                  <div class="boot-block boot-block--dark" style="width: 100%; height: 56px; border-radius: 16px; opacity: 0.9"></div>
                </div>
                <div class="boot-block boot-block--dark" style="width: 100%; height: 120px; border-radius: 22px; opacity: 0.7"></div>
              </div>
            </div>

            <div class="boot-footer">
              <div class="boot-footer-inner">
                <div class="boot-block boot-block--dark" style="width: 44px; height: 44px; opacity: 0.6"></div>
                <div class="boot-block boot-block--dark" style="width: 144px; height: 48px"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
