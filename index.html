<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <title>Create Account | Professional Registration</title>
    <meta
      name="description"
      content="Create your professional account to access exclusive wholesale pricing and pro perks."
    />
    <meta name="author" content="Lovable" />

    <!-- Preload critical fonts for faster rendering -->
    <link rel="preload" href="/fonts/die-grotesk-b-regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/die-grotesk-b-medium.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/termina-medium.otf" as="font" type="font/opentype" crossorigin />

    <!-- Bebas Neue fallback for Termina -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/index.css" />

    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: hsl(36 33% 96%);
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      .boot-shell {
        min-height: 100vh;
        display: flex;
        background: hsl(36 33% 96%);
      }

      .boot-app {
        display: flex;
        flex: 1;
        flex-direction: column;
        background: hsl(36 33% 96%);
        overflow: hidden;
      }

      .boot-panel {
        position: relative;
        min-height: 220px;
        margin: 10px 10px 0;
        border-radius: 20px;
        overflow: hidden;
        background: linear-gradient(160deg, hsl(24 18% 12%) 0%, hsl(20 20% 18%) 48%, hsl(18 24% 24%) 100%);
      }

      .boot-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at top right, hsla(0, 0%, 100%, 0.12), transparent 35%),
          radial-gradient(circle at bottom left, hsla(0, 0%, 100%, 0.08), transparent 40%);
      }

      .boot-top,
      .boot-hero,
      .boot-bottom,
      .boot-header,
      .boot-content,
      .boot-footer {
        position: relative;
        z-index: 1;
      }

      .boot-top,
      .boot-bottom,
      .boot-header,
      .boot-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .boot-top {
        padding: 20px 20px 0;
      }

      .boot-brand {
        color: hsla(36, 33%, 96%, 0.92);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.24em;
      }

      .boot-hero {
        position: absolute;
        left: 20px;
        right: 20px;
        bottom: 56px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .boot-bottom {
        position: absolute;
        left: 20px;
        right: 20px;
        bottom: 20px;
      }

      .boot-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .boot-header {
        min-height: 64px;
        padding: 14px 12px;
        gap: 12px;
      }

      .boot-content {
        flex: 1;
        padding: 20px 16px 16px;
        display: flex;
        justify-content: center;
      }

      .boot-form {
        width: 100%;
        max-width: 38rem;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .boot-footer {
        padding: 0 16px 16px;
        justify-content: center;
      }

      .boot-footer-inner {
        width: 100%;
        max-width: 38rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .boot-block {
        border-radius: 999px;
        background-size: 200% 100%;
        animation: boot-shimmer 1.15s linear infinite;
      }

      .boot-block--light {
        background-image: linear-gradient(90deg, hsla(0, 0%, 100%, 0.12) 0%, hsla(0, 0%, 100%, 0.26) 50%, hsla(0, 0%, 100%, 0.12) 100%);
      }

      .boot-block--dark {
        background-image: linear-gradient(90deg, hsla(28, 18%, 80%, 0.42) 0%, hsla(28, 18%, 88%, 0.84) 50%, hsla(28, 18%, 80%, 0.42) 100%);
      }

      .boot-row {
        display: flex;
        gap: 10px;
      }

      .boot-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      @keyframes boot-shimmer {
        from {
          background-position: 200% 0;
        }
        to {
          background-position: -200% 0;
        }
      }

      @media (min-width: 1024px) {
        .boot-app {
          flex-direction: row;
        }

        .boot-panel {
          flex: 0 0 calc(50% - 20px);
          min-height: auto;
          margin: 20px 0 20px 20px;
        }

        .boot-top,
        .boot-hero,
        .boot-bottom {
          left: 40px;
          right: 40px;
        }

        .boot-top {
          padding: 40px 0 0;
        }

        .boot-hero {
          bottom: 80px;
          gap: 14px;
        }

        .boot-bottom {
          bottom: 40px;
        }

        .boot-header {
          min-height: 80px;
          padding: 24px 25px;
        }

        .boot-content {
          padding: 24px 32px 20px;
        }

        .boot-footer {
          padding: 0 25px 25px;
        }
      }
    </style>

    <meta property="og:title" content="Create Account | Professional Registration" />
    <meta
      property="og:description"
      content="Create your professional account to access exclusive wholesale pricing and pro perks."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root">
      <div class="boot-shell" aria-hidden="true">
        <div class="boot-app">
          <div class="boot-panel">
            <div class="boot-top">
              <div class="boot-brand">DROP DEAD</div>
              <div class="boot-block boot-block--light" style="width: 56px; height: 56px; opacity: 0.8"></div>
            </div>

            <div class="boot-hero">
              <div class="boot-block boot-block--light" style="width: 156px; height: 28px; opacity: 0.8"></div>
              <div class="boot-block boot-block--light" style="width: 62%; height: 52px; border-radius: 14px; opacity: 0.85"></div>
              <div class="boot-block boot-block--light" style="width: 76%; height: 52px; border-radius: 14px"></div>
              <div class="boot-block boot-block--light" style="width: 48%; height: 18px; border-radius: 8px; opacity: 0.7"></div>
            </div>

            <div class="boot-bottom">
              <div class="boot-row">
                <div class="boot-block boot-block--light" style="width: 40px; height: 5px"></div>
                <div class="boot-block boot-block--light" style="width: 5px; height: 5px; opacity: 0.55"></div>
                <div class="boot-block boot-block--light" style="width: 5px; height: 5px; opacity: 0.35"></div>
              </div>
              <div class="boot-block boot-block--light" style="width: 108px; height: 34px; opacity: 0.7"></div>
            </div>
          </div>

          <div class="boot-right">
            <div class="boot-header">
              <div class="boot-block boot-block--dark" style="width: 124px; height: 38px"></div>
              <div class="boot-block boot-block--dark" style="width: 142px; height: 16px; border-radius: 8px; opacity: 0.65"></div>
            </div>

            <div class="boot-content">
              <div class="boot-form">
                <div class="boot-block boot-block--dark" style="width: 118px; height: 12px; border-radius: 8px; opacity: 0.7"></div>
                <div class="boot-block boot-block--dark" style="width: 66%; height: 40px; border-radius: 12px"></div>
                <div class="boot-block boot-block--dark" style="width: 88%; height: 18px; border-radius: 8px; opacity: 0.75"></div>
                <div class="boot-block boot-block--dark" style="width: 100%; height: 56px; border-radius: 16px; opacity: 0.9"></div>
                <div class="boot-block boot-block--dark" style="width: 100%; height: 56px; border-radius: 16px; opacity: 0.9"></div>
                <div class="boot-grid">
                  <div class="boot-block boot-block--dark" style="width: 100%; height: 56px; border-radius: 16px; opacity: 0.9"></div>
                  <div class="boot-block boot-block--dark" style="width: 100%; height: 56px; border-radius: 16px; opacity: 0.9"></div>
                </div>
                <div class="boot-block boot-block--dark" style="width: 100%; height: 120px; border-radius: 22px; opacity: 0.7"></div>
              </div>
            </div>

            <div class="boot-footer">
              <div class="boot-footer-inner">
                <div class="boot-block boot-block--dark" style="width: 44px; height: 44px; opacity: 0.6"></div>
                <div class="boot-block boot-block--dark" style="width: 144px; height: 48px"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
