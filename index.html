<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <title>Create Account | Professional Registration</title>
    <meta
      name="description"
      content="Create your professional account to access exclusive wholesale pricing and pro perks."
    />
    <meta name="author" content="Lovable" />

    <!-- Preload critical fonts from the Shopify CDN so they share the parent theme's font cache and avoid FOUC inside the iframe. -->
    <link rel="preconnect" href="https://cdn.shopify.com" crossorigin />
    <link rel="preload" href="https://cdn.shopify.com/s/files/1/0671/5614/8541/files/die-grotesk-b-regular.woff2?v=1776715238" as="font" type="font/woff2" crossorigin fetchpriority="high" />
    <link rel="preload" href="https://cdn.shopify.com/s/files/1/0671/5614/8541/files/die-grotesk-b-medium.woff2?v=1776715238" as="font" type="font/woff2" crossorigin fetchpriority="high" />
    <link rel="preload" href="./fonts/termina-medium.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Bebas Neue fallback for Termina — loaded async to avoid render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <!-- Inline boot styles — must paint before any network resource so the skeleton appears immediately. index.css is loaded by the React bundle (src/main.tsx) and is intentionally NOT linked here to avoid a render-blocking 404 in production builds (where /src/index.css does not exist). -->
    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; min-height: 100%; background: hsl(0 0% 98%); }
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      #root { min-height: 100vh; }

      /* Boot skeleton — visible until React mounts */
      @keyframes boot-shimmer {
        from { background-position: 200% 0; }
        to { background-position: -200% 0; }
      }
      .boot-shell { min-height: 100vh; display: flex; background: hsl(0 0% 98%); }
      .boot-wrap { display: flex; flex: 1; overflow: hidden; }
      .boot-dark {
        position: relative; overflow: hidden; border-radius: 20px;
        background: linear-gradient(160deg, hsl(0 0% 12%) 0%, hsl(0 0% 16%) 48%, hsl(0 0% 20%) 100%);
      }
      .boot-dark::before {
        content: ""; position: absolute; inset: 0;
        background: radial-gradient(circle at top right, hsla(0,0%,100%,0.12), transparent 35%),
                    radial-gradient(circle at bottom left, hsla(0,0%,100%,0.08), transparent 40%);
      }
      .boot-block {
        border-radius: 999px;
        background: linear-gradient(90deg, hsla(0,0%,100%,0.12) 0%, hsla(0,0%,100%,0.24) 50%, hsla(0,0%,100%,0.12) 100%);
        background-size: 200% 100%; animation: boot-shimmer 1.25s linear infinite;
      }
      .boot-block-dark {
        border-radius: 999px;
        background: linear-gradient(90deg, hsla(0,0%,0%,0.06) 0%, hsla(0,0%,0%,0.12) 50%, hsla(0,0%,0%,0.06) 100%);
        background-size: 200% 100%; animation: boot-shimmer 1.25s linear infinite;
      }
      /* Desktop layout */
      @media (min-width: 1024px) {
        .boot-wrap { flex-direction: row; }
        .boot-dark { flex: 0 0 50%; margin: 20px 0 20px 20px; }
        .boot-right { flex: 1; display: flex; flex-direction: column; }
        .boot-header { min-height: clamp(55px, 8vh, 80px); padding: clamp(10px, 1.8vh, 24px) 25px; display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; gap: 12px; }
        .boot-mobile-hero { display: none; }
        .boot-dark-top { top: 40px !important; left: 40px !important; right: 40px !important; }
        .boot-dark-content { left: 40px !important; right: 40px !important; bottom: 80px !important; }
      }
      /* Mobile layout */
      @media (max-width: 1023px) {
        .boot-wrap { flex-direction: column; }
        .boot-dark { flex: 0 0 auto; min-height: 220px; margin: 10px 10px 0 10px; }
        .boot-right { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .boot-header { min-height: 64px; padding: 14px 12px; display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 12px; }
        .boot-close-desktop { display: none !important; }
        .boot-mobile-hero { display: block; }
      }
    </style>

    <meta property="og:title" content="Create Account | Professional Registration" />
    <meta
      property="og:description"
      content="Create your professional account to access exclusive wholesale pricing and pro perks."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Notify the parent (Shopify theme overlay) that the iframe is alive AS EARLY AS POSSIBLE — runs before the body parses so the parent can hide its own loading state and the user sees the inline boot skeleton immediately. -->
    <script>
      (function () {
        if (!(window.self !== window.top && window.parent)) return;
        var targetOrigin = '*';
        try { if (document.referrer) targetOrigin = new URL(document.referrer).origin; } catch (e) {}
        var attempts = 0, maxAttempts = 20;
        function notify(phase) {
          try {
            window.parent.postMessage({
              type: 'IFRAME_READY',
              data: { url: window.location.href, phase: phase, attempt: attempts },
              timestamp: new Date().toISOString(),
            }, targetOrigin);
          } catch (e) {}
        }
        notify('head-initial');
        var timer = window.setInterval(function () {
          attempts += 1;
          notify('skeleton-heartbeat');
          if (attempts >= maxAttempts) window.clearInterval(timer);
        }, 250);
        window.addEventListener('load', function () { notify('window-load'); }, { once: true });
      })();
    </script>

    <!-- SSO context: set data-sso-source on <html> as early as possible so per-partner CSS hooks apply during the boot skeleton phase. Validated against the same /^[a-z0-9-]{1,32}$/ allowlist used by the React layer. -->
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var source = (params.get('sso') || '').toLowerCase();
          if (/^[a-z0-9-]{1,32}$/.test(source)) {
            document.documentElement.setAttribute('data-sso-source', source);
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root">
      <!-- Boot skeleton — replaced by React on mount -->
      <div class="boot-shell" aria-hidden="true">
        <div class="boot-wrap">
          <!-- Left dark panel -->
          <div class="boot-dark">
            <div style="position:absolute;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:center" class="boot-dark-top">
              <div class="boot-block" style="width:88px;height:18px;border-radius:6px;opacity:0.7"></div>
              <div class="boot-block boot-close-desktop" style="width:56px;height:56px;opacity:0.8"></div>
            </div>
            <div style="position:absolute;left:20px;right:20px;bottom:56px;display:flex;flex-direction:column;gap:14px" class="boot-dark-content">
              <div class="boot-block" style="width:156px;height:28px;opacity:0.8"></div>
              <div style="display:flex;flex-direction:column;gap:10px">
                <div class="boot-block" style="width:62%;height:52px;border-radius:14px;opacity:0.85"></div>
                <div class="boot-block" style="width:76%;height:52px;border-radius:14px"></div>
              </div>
              <div class="boot-block" style="width:48%;height:18px;border-radius:8px;opacity:0.7"></div>
            </div>
            <div style="position:absolute;left:20px;right:20px;bottom:20px;display:flex;justify-content:space-between;align-items:center">
              <div style="display:flex;gap:10px">
                <div class="boot-block" style="width:40px;height:5px"></div>
                <div class="boot-block" style="width:5px;height:5px;opacity:0.55"></div>
                <div class="boot-block" style="width:5px;height:5px;opacity:0.35"></div>
              </div>
              <div class="boot-block" style="width:108px;height:34px;opacity:0.7"></div>
            </div>
          </div>
          <!-- Right panel -->
          <div class="boot-right" style="background:hsl(0 0% 98%)">
            <div class="boot-header">
              <div style="display:flex;justify-content:flex-start"><div class="boot-block-dark" style="width:124px;height:38px"></div></div>
              <div style="display:flex;justify-content:center"><div class="boot-block-dark" style="width:142px;height:16px;border-radius:8px;opacity:0.65"></div></div>
              <div class="boot-close-desktop" style="display:flex;justify-content:flex-end"><div class="boot-block-dark" style="width:36px;height:36px;opacity:0.75"></div></div>
            </div>
            <div style="flex:1;display:flex;justify-content:center;padding:24px 32px 20px">
              <div style="width:100%;max-width:38rem;display:flex;flex-direction:column;gap:18px">
                <div class="boot-block-dark" style="width:118px;height:12px;border-radius:8px;opacity:0.7"></div>
                <div class="boot-block-dark" style="width:66%;height:40px;border-radius:12px"></div>
                <div class="boot-block-dark" style="width:88%;height:18px;border-radius:8px;opacity:0.75"></div>
                <div style="height:8px"></div>
                <div class="boot-block-dark" style="width:100%;height:56px;border-radius:16px;opacity:0.9"></div>
                <div class="boot-block-dark" style="width:100%;height:56px;border-radius:16px;opacity:0.9"></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                  <div class="boot-block-dark" style="width:100%;height:56px;border-radius:16px;opacity:0.9"></div>
                  <div class="boot-block-dark" style="width:100%;height:56px;border-radius:16px;opacity:0.9"></div>
                </div>
                <div class="boot-block-dark" style="width:100%;height:120px;border-radius:22px;opacity:0.7"></div>
              </div>
            </div>
            <div style="padding:0 25px 25px">
              <div style="max-width:38rem;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px">
                <div class="boot-block-dark" style="width:44px;height:44px;opacity:0.6"></div>
                <div class="boot-block-dark" style="width:184px;height:48px"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
